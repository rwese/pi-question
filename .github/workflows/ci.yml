name: CI Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write
  statuses: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: |
          npx prettier --check extensions/ || {
            echo "Format issues found. Run 'npm run format' to fix."
            exit 1
          }

  test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Validate extension structure
        run: |
          echo "Checking extension structure..."
          test -f extensions/index.ts || exit 1
          test -f package.json || exit 1
          echo "✓ Extension structure valid"
